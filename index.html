<script>
const SUPABASE_URL =
  "https://gdbvwzwkguankzabjlup.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_JyHn5_XGnNmqnQSQM4h2Zw_WwGbKeBE";

const BUCKET = "wedding-uploads";

const MAX_FILE_SIZE = 50 * 1024 * 1024;

const ALLOWED_TYPES = [
  "image/jpeg",
  "image/png",
  "image/webp",
  "image/gif",
  "video/mp4"
];

const fileInput = document.getElementById("fileInput");
const statusBox = document.getElementById("statusBox");

function showStatus(message,type=""){
  statusBox.className="status-box show";

  if(type){
    statusBox.classList.add(type);
  }

  statusBox.textContent=message;
}

function cleanFileName(fileName){
  return fileName
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-zA-Z0-9._-]/g,"")
    .toLowerCase();
}

function createFilePath(fileName){
  const cleanedName=cleanFileName(fileName);

  const uniqueId=
    Date.now()+"-"+Math.random().toString(36).slice(2,10);

  return `brollop/${uniqueId}-${cleanedName}`;
}

async function uploadFile(file){
  const path=createFilePath(file.name);

  const uploadUrl=
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`;

  const response=await fetch(uploadUrl,{
    method:"POST",

    headers:{
      "apikey":SUPABASE_KEY,
      "Content-Type":file.type || "application/octet-stream",
      "x-upsert":"false"
    },

    body:file
  });

  const responseText=await response.text();

  let responseData=null;

  try{
    responseData=JSON.parse(responseText);
  }catch{
    responseData=null;
  }

  if(!response.ok){
    const errorMessage=
      responseData?.message ||
      responseData?.error ||
      responseText ||
      `Uppladdningen misslyckades. Felkod ${response.status}.`;

    throw new Error(errorMessage);
  }

  return path;
}

fileInput.addEventListener("change",async()=>{
  const files=Array.from(fileInput.files || []);

  if(files.length===0){
    return;
  }

  for(const file of files){

    if(!ALLOWED_TYPES.includes(file.type)){
      showStatus(
        `❌ Filtypen stöds inte: ${file.name}`,
        "error"
      );

      fileInput.value="";
      return;
    }

    if(file.size>MAX_FILE_SIZE){
      showStatus(
        `❌ ${file.name} är större än 50 MB.`,
        "error"
      );

      fileInput.value="";
      return;
    }
  }

  let uploaded=0;

  try{
    showStatus(
      `⏳ Förbereder uppladdning av ${files.length} fil(er)...`
    );

    for(const file of files){

      showStatus(
        `⏳ Laddar upp ${uploaded+1} av ${files.length}: ${file.name}`
      );

      await uploadFile(file);

      uploaded++;
    }

    showStatus(
      `✅ Tack! ${uploaded} fil(er) har laddats upp.`,
      "success"
    );

  }catch(error){

    console.error("Supabase upload error:",error);

    showStatus(
      `❌ Fel: ${error.message}`,
      "error"
    );

  }finally{
    fileInput.value="";
  }
});
</script>
