<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>Monica & Bjarne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #eee4d8;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 1024px;
      aspect-ratio: 1024 / 1536;
      background:
        url("background.jpeg")
        center top /
        100% auto
        no-repeat;
    }

    /*
      Osynligt klickområde ovanpå knappen
      "Ladda upp bilder".
    */
    .upload-click {
      position: absolute;
      left: 25%;
      top: 51.5%;
      width: 20%;
      height: 5%;
      z-index: 50;
      cursor: pointer;
      border-radius: 30px;
    }

    .upload-click input {
      display: none;
    }

    /*
      Statusmeddelandet visas endast
      när något händer.
    */
    .status-box {
      position: absolute;
      left: 8%;
      top: 58.5%;
      width: 50%;
      min-height: 44px;
      padding: 12px 14px;

      display: none;
      align-items: center;
      justify-content: center;

      text-align: center;
      font-size: clamp(12px, 2.6vw, 18px);
      line-height: 1.4;

      color: #47382d;
      background: rgba(255, 250, 244, 0.94);
      border: 1px solid rgba(106, 83, 63, 0.25);
      border-radius: 12px;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.12);

      z-index: 60;
    }

    .status-box.show {
      display: flex;
    }

    .status-box.success {
      color: #245c36;
      border-color: rgba(36, 92, 54, 0.35);
    }

    .status-box.error {
      color: #8b2020;
      border-color: rgba(139, 32, 32, 0.35);
    }

    .status-box.loading {
      color: #47382d;
    }

    .spinner {
      width: 19px;
      height: 19px;
      margin-right: 9px;

      border: 3px solid rgba(71, 56, 45, 0.2);
      border-top-color: #47382d;
      border-radius: 50%;

      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /*
      För mobiler där bakgrundens höjd
      behöver följa bildens proportioner.
    */
    @media (max-width: 1024px) {
      .page {
        min-height: 150vw;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <label
      class="upload-click"
      for="imageInput"
      aria-label="Ladda upp bilder"
    >
      <input
        id="imageInput"
        type="file"
        accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
        multiple
      >
    </label>

    <div id="statusBox" class="status-box"></div>

  </main>

  <!-- Supabase JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /*
      ======================================================
      FYLL I DINA SUPABASE-UPPGIFTER HÄR
      ======================================================
    */

    const SUPABASE_URL =
      "https://DIN-PROJECT-ID.supabase.co";

    const SUPABASE_ANON_KEY =
      "KListra-IN-DIN-ANON-PUBLIC-KEY-HÄR";

    /*
      Namnet måste vara exakt samma som
      bucketens namn i Supabase.
    */
    const BUCKET_NAME = "wedding-uploads";


    /*
      ======================================================
      SUPABASE-KLIENT
      ======================================================
    */

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );


    /*
      ======================================================
      HÄMTA HTML-ELEMENT
      ======================================================
    */

    const imageInput = document.getElementById("imageInput");
    const statusBox = document.getElementById("statusBox");


    /*
      ======================================================
      VISA STATUS
      ======================================================
    */

    function showStatus(message, type = "loading") {
      statusBox.className = "status-box show " + type;

      if (type === "loading") {
        statusBox.innerHTML =
          '<span class="spinner"></span><span>' +
          message +
          "</span>";
      } else {
        statusBox.textContent = message;
      }
    }


    function hideStatusAfter(milliseconds = 5000) {
      window.setTimeout(() => {
        statusBox.className = "status-box";
        statusBox.textContent = "";
      }, milliseconds);
    }


    /*
      ======================================================
      GÖR FILNAMNET SÄKERT
      ======================================================
    */

    function cleanFileName(fileName) {
      const lastDot = fileName.lastIndexOf(".");

      const extension =
        lastDot !== -1
          ? fileName.substring(lastDot).toLowerCase()
          : "";

      const name =
        lastDot !== -1
          ? fileName.substring(0, lastDot)
          : fileName;

      const cleanedName = name
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/å/gi, "a")
        .replace(/ä/gi, "a")
        .replace(/ö/gi, "o")
        .replace(/[^a-zA-Z0-9_-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "")
        .toLowerCase();

      return (cleanedName || "bild") + extension;
    }


    /*
      ======================================================
      SKAPA UNIKT FILNAMN
      ======================================================
    */

    function createUniqueFilePath(file) {
      const safeName = cleanFileName(file.name);

      const randomPart =
        Math.random()
          .toString(36)
          .substring(2, 10);

      const datePart =
        new Date()
          .toISOString()
          .replace(/[:.]/g, "-");

      return "wedding/" +
        datePart +
        "-" +
        randomPart +
        "-" +
        safeName;
    }


    /*
      ======================================================
      KONTROLLERA FILEN
      ======================================================
    */

    function validateFile(file) {
      const allowedTypes = [
        "image/jpeg",
        "image/png",
        "image/webp",
        "image/heic",
        "image/heif"
      ];

      /*
        Max 20 MB per bild.
      */
      const maxSize = 20 * 1024 * 1024;

      if (
        file.type &&
        !allowedTypes.includes(file.type)
      ) {
        throw new Error(
          file.name +
          " har ett bildformat som inte stöds."
        );
      }

      if (file.size > maxSize) {
        throw new Error(
          file.name +
          " är större än 20 MB."
        );
      }
    }


    /*
      ======================================================
      LADDA UPP EN BILD
      ======================================================
    */

    async function uploadOneImage(file) {
      validateFile(file);

      const filePath = createUniqueFilePath(file);

      const { data, error } =
        await supabaseClient.storage
          .from(BUCKET_NAME)
          .upload(filePath, file, {
            cacheControl: "3600",
            upsert: false,
            contentType:
              file.type || "application/octet-stream"
          });

      if (error) {
        console.error(
          "Supabase uppladdningsfel:",
          error
        );

        throw new Error(error.message);
      }

      return data;
    }


    /*
      ======================================================
      LADDA UPP ALLA VALDA BILDER
      ======================================================
    */

    async function uploadSelectedImages(files) {
      if (!files || files.length === 0) {
        return;
      }

      const fileArray = Array.from(files);
      let uploadedCount = 0;

      try {
        for (
          let index = 0;
          index < fileArray.length;
          index++
        ) {
          const file = fileArray[index];

          showStatus(
            "Laddar upp bild " +
            (index + 1) +
            " av " +
            fileArray.length +
            "…",
            "loading"
          );

          await uploadOneImage(file);
          uploadedCount++;
        }

        if (uploadedCount === 1) {
          showStatus(
            "Tack! Bilden har sparats.",
            "success"
          );
        } else {
          showStatus(
            "Tack! " +
            uploadedCount +
            " bilder har sparats.",
            "success"
          );
        }

        imageInput.value = "";
        hideStatusAfter(6000);

      } catch (error) {
        console.error(error);

        showStatus(
          "Bilden kunde inte laddas upp. " +
          error.message,
          "error"
        );

        imageInput.value = "";
      }
    }


    /*
      ======================================================
      STARTA UPPLADDNING NÄR BILDER VÄLJS
      ======================================================
    */

    imageInput.addEventListener(
      "change",
      function () {
        uploadSelectedImages(imageInput.files);
      }
    );
  </script>

</body>
</html>
