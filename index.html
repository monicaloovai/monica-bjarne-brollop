<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monica & Bjarne</title>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  background:#eee4d8;
  font-family:Arial, sans-serif;
}

body{
  display:flex;
  justify-content:center;
}

.page{
  position:relative;
  width:100%;
  max-width:1024px;
  aspect-ratio:1024 / 1536;
  background-image:url("background.jpg.jpeg");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center top;
}

/* osynlig knapp ovanpå VÄLJ FILER */
.upload-click{
  position:absolute;
  left:22.8%;
  top:66.3%;
  width:14.7%;
  height:3.1%;
  cursor:pointer;
  z-index:20;
}

.upload-click input{
  display:none;
}

/* mobil */
@media(max-width:700px){
  .page{
    width:100vw;
    max-width:none;
  }
}
</style>
</head>

<body>

<div class="page">
  <label class="upload-click">
    <input 
      type="file"
      multiple
      accept="image/jpeg,image/png,image/webp,image/heic,video/mp4,video/quicktime"
    />
  </label>
</div>

</body>
</html>
