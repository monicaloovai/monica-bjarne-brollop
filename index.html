<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monica & Bjarne</title>

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  background:#eee4d8;
}

body{
  display:flex;
  justify-content:center;
}

.page{
  position:relative;
  width:100vw;
  max-width:1024px;
  aspect-ratio:1024 / 1536;
  min-height:153vw;
  background:url("background.jpeg") center top / 100% auto no-repeat;
}

/*
  Ljus ruta som täcker den gamla QR-koden.
  Den är placerad mitt i det högra kortet.
*/
.qr-cover{
  position:absolute;
  left:64.6%;
  top:39.9%;
  width:25.8%;
  height:20.3%;

  display:flex;
  justify-content:center;
  align-items:center;

  background:#fffaf2;
  border-radius:7%;
  box-shadow:0 5px 16px rgba(0,0,0,.06);
  overflow:hidden;
  z-index:40;
}

/*
  QR-koden är mindre och exakt centrerad.
  Flexbox ger samma avstånd på båda sidorna.
*/
.qr-overlay{
  display:block;
  width:58%;
  height:auto;
  max-width:58%;
  margin:0;
  padding:0;
  object-fit:contain;
  transform:none;
}

/* Klickområdet ovanpå knappen VÄLJ FILER */
.upload-click{
  position:absolute;
  left:27.8%;
  top:52.6%;
  width:11.2%;
  height:2.8%;
  cursor:pointer;
  z-index:50;
}

.upload-click input{
  display:none;
}

/* Meddelanderutan för uppladdning */
.status-box{
  position:absolute;
  left:8%;
  top:60.5%;
  width:50%;
  padding:12px;

  background:#ffffff;
  border-radius:14px;
  box-shadow:0 5px 18px rgba(0,0,0,.15);

  font-family:Arial,Helvetica,sans-serif;
  font-size:13px;
  color:#222;

  display:none;
  z-index:60;
}

.status-box.show{
  display:block;
}

.status-box.success{
  color:#176b3a;
  background:#f0fff5;
}

.status-box.error{
  color:#9b1c1c;
  background:#fff2f2;
}

@media(min-width:701px){
  .page{
    min-height:auto;
  }
}
</style>

      type="file"

<script>
const SUPABASE_URL =
  "https://gdbvwzwkguankzabjlup.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_JyHn5_XGnNmqnQSQM4h2Zw_WwGbKeBE";

const BUCKET = "wedding-uploads";

const MAX_FILE_SIZE = 50 * 1024 * 1024;

const ALLOWED_TYPES = [
  "image/jpeg",
  "image/png",
  "image/webp",
  "image/gif",
  "video/mp4"
];

const fileInput = document.getElementById("fileInput");
const statusBox = document.getElementById("statusBox");

function showStatus(message,type=""){
  statusBox.className="status-box show";

  if(type){
    statusBox.classList.add(type);
  }

  statusBox.textContent=message;
}

function cleanFileName(fileName){
  return fileName
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-zA-Z0-9._-]/g,"")
    .toLowerCase();
}

function createFilePath(fileName){
  const cleanedName=cleanFileName(fileName);

  const uniqueId=
    Date.now()+"-"+Math.random().toString(36).slice(2,10);

  return `brollop/${uniqueId}-${cleanedName}`;
}

async function uploadFile(file){
  const path=createFilePath(file.name);

  const uploadUrl=
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`;

  const response=await fetch(uploadUrl,{
    method:"POST",

    headers:{
      "apikey":SUPABASE_KEY,
      "Content-Type":file.type || "application/octet-stream",
      "x-upsert":"false"
    },

    body:file
  });

  const responseText=await response.text();

  let responseData=null;

  try{
    responseData=JSON.parse(responseText);
  }catch{
    responseData=null;
  }

  if(!response.ok){
    const errorMessage=
      responseData?.message ||
      responseData?.error ||
      responseText ||
      `Uppladdningen misslyckades. Felkod ${response.status}.`;

    throw new Error(errorMessage);
  }

  return path;
}

fileInput.addEventListener("change",async()=>{
  const files=Array.from(fileInput.files || []);

  if(files.length===0){
    return;
  }

  for(const file of files){

    if(!ALLOWED_TYPES.includes(file.type)){
      showStatus(
        `❌ Filtypen stöds inte: ${file.name}`,
        "error"
      );

      fileInput.value="";
      return;
    }

    if(file.size>MAX_FILE_SIZE){
      showStatus(
        `❌ ${file.name} är större än 50 MB.`,
        "error"
      );

      fileInput.value="";
      return;
    }
  }

  let uploaded=0;

  try{
    showStatus(
      `⏳ Förbereder uppladdning av ${files.length} fil(er)...`
    );

    for(const file of files){

      showStatus(
        `⏳ Laddar upp ${uploaded+1} av ${files.length}: ${file.name}`
      );

      await uploadFile(file);

      uploaded++;
    }

    showStatus(
      `✅ Tack! ${uploaded} fil(er) har laddats upp.`,
      "success"
    );

  }catch(error){

    console.error("Supabase upload error:",error);

    showStatus(
      `❌ Fel: ${error.message}`,
      "error"
    );

  }finally{
    fileInput.value="";
  }
});
</script>
