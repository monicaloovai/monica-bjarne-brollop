<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monica & Bjarne</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#eee4d8;
}

body{
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.page{
  position:relative;
  width:100vw;
  max-width:1024px;
  aspect-ratio:1024 / 1536;
  min-height:153vw;
  background:url("background.jpeg") center top / 100% auto no-repeat;
}

.upload-click{
  position:absolute;
  left:27.8%;
  top:52.6%;
  width:11.2%;
  height:2.8%;
  cursor:pointer;
  z-index:50;
}

.upload-click input{
  display:none;
}

.status-box{
  position:absolute;
  left:8%;
  top:60.5%;
  width:50%;
  min-height:60px;
  padding:10px;
  background:rgba(255,255,255,.95);
  border-radius:12px;
  font-family:Arial,sans-serif;
  font-size:12px;
  color:#222;
  z-index:60;
  display:none;
  box-shadow:0 5px 18px rgba(0,0,0,.15);
}

.status-box.show{
  display:block;
}

@media(min-width:701px){
  .page{
    min-height:auto;
  }

  .status-box{
    left:10.5%;
    top:61.5%;
    width:45%;
    font-size:14px;
    padding:14px;
  }
}
</style>
</head>

<body>

<div class="page">

  <label class="upload-click">
    <input
      id="fileInput"
      type="file"
      multiple
      accept="image/*,video/*"
    >
  </label>

  <div id="statusBox" class="status-box"></div>

</div>

<script>
const SUPABASE_URL = "https://xcjlfsyvufnsouzjfhcb.supabase.co";
const SUPABASE_KEY = "sb_publishable_nx-e_qhQnrjvcyxdwEjrzg_zftmmMDe";
const BUCKET = "wedding-uploads";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const fileInput = document.getElementById("fileInput");
const statusBox = document.getElementById("statusBox");

function showMessage(message){
  statusBox.classList.add("show");
  statusBox.innerHTML = message;
}

function cleanFileName(name){
  return name
    .replace(/\s+/g, "-")
    .replace(/[åä]/g, "a")
    .replace(/[ö]/g, "o")
    .replace(/[ÅÄ]/g, "A")
    .replace(/[Ö]/g, "O")
    .replace(/[^a-zA-Z0-9._-]/g, "");
}

fileInput.addEventListener("change", async () => {
  const files = Array.from(fileInput.files);

  if (!files.length) return;

  showMessage("⏳ Laddar upp...");

  let uploaded = 0;

  for (const file of files) {
    try {
      const safeName = cleanFileName(file.name);
      const filePath = "brollop/" + Date.now() + "-" + Math.random().toString(36).slice(2) + "-" + safeName;

      const { data, error } = await supabaseClient.storage
        .from(BUCKET)
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "application/octet-stream"
        });

      if (error) {
        console.error("Supabase error:", error);
        showMessage("❌ Fel: " + error.message);
        return;
      }

      uploaded++;
      showMessage("⏳ Laddar upp " + uploaded + " av " + files.length + "...");
    } catch (err) {
      console.error("Upload failed:", err);
      showMessage("❌ Fel: " + (err.message || "Uppladdningen misslyckades"));
      return;
    }
  }

  showMessage("✅ Tack! Dina filer har laddats upp.");
  fileInput.value = "";
});
</script>

</body>
</html>
