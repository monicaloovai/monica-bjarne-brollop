<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monica & Bjarne</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eee4d8;
  display:flex;
  justify-content:center;
  font-family:Arial, sans-serif;
}

.page{
  position:relative;
  width:100%;
  max-width:1024px;
  aspect-ratio:1024 / 1536;
  background:url("background.jpg") center top / contain no-repeat;
}

/* osynlig klickyta exakt över VÄLJ FILER */
.upload-click{
  position:absolute;
  left:22.8%;
  top:65.2%;
  width:14.8%;
  height:3.2%;
  cursor:pointer;
  z-index:10;
}

.upload-click input{
  display:none;
}

@media(max-width:600px){
  .page{
    width:100vw;
    max-width:none;
  }
}
</style>
</head>

<body>

<div class="page">

  <label class="upload-click">
    <input 
      type="file" 
      multiple 
      accept="image/jpeg,image/png,image/webp,image/heic,video/mp4,video/quicktime"
    >
  </label>

</div>

</body>
</html>
