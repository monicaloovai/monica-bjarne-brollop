<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
  >

  <title>Monica & Bjarne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #eee4d8;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /*
      Hela originaldesignen ligger i background.jpeg.
      Bildens format är 1024 × 1536.
    */
    .page {
      position: relative;
      width: 100%;
      max-width: 1024px;
      aspect-ratio: 1024 / 1536;

      background-image: url("background.jpeg");
      background-position: center top;
      background-repeat: no-repeat;
      background-size: 100% 100%;

      overflow: hidden;
    }

    /*
      Osynligt klickområde ovanpå den streckade
      uppladdningsrutan i originaldesignen.
    */
    .upload-area {
      position: absolute;
      left: 10.8%;
      top: 45.1%;
      width: 45.3%;
      height: 13.7%;

      z-index: 20;
      cursor: pointer;
      border-radius: 14px;
    }

    .upload-area:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .upload-area.dragging {
      background: rgba(187, 145, 72, 0.15);
      outline: 2px dashed rgba(164, 121, 48, 0.7);
      outline-offset: -5px;
    }

    #fileInput {
      display: none;
    }

    /*
      Ljus ruta som täcker QR-koden i bakgrundsbilden.
      Den riktiga fungerande QR-koden läggs ovanpå.
    */
    .qr-cover {
      position: absolute;
      left: 64.9%;
      top: 42.85%;
      width: 23.1%;
      aspect-ratio: 1 / 1;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 1.7%;
      background: #faf6ef;
      border-radius: 2.2%;

      z-index: 15;
    }

    #qrCode {
      width: 100%;
      height: 100%;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qrCode canvas,
    #qrCode img {
      display: block;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      image-rendering: pixelated;
    }

    /*
      Meddelanderutan visas bara när användaren
      väljer eller laddar upp filer.
    */
    .status-box {
      position: fixed;
      left: 50%;
      bottom: 25px;
      transform: translateX(-50%);

      width: min(92%, 540px);
      padding: 15px 18px;

      display: none;
      align-items: center;
      justify-content: center;
      gap: 11px;

      border-radius: 13px;
      background: rgba(255, 252, 247, 0.98);
      border: 1px solid rgba(122, 96, 72, 0.25);
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);

      color: #453a32;
      font-size: 15px;
      line-height: 1.45;
      text-align: center;

      z-index: 1000;
    }

    .status-box.show {
      display: flex;
    }

    .status-box.success {
      color: #25633a;
      background: rgba(242, 250, 244, 0.98);
      border-color: rgba(37, 99, 58, 0.3);
    }

    .status-box.error {
      color: #8b2929;
      background: rgba(255, 244, 244, 0.98);
      border-color: rgba(139, 41, 41, 0.3);
    }

    .spinner {
      width: 20px;
      height: 20px;
      flex-shrink: 0;

      border: 3px solid rgba(90, 68, 51, 0.2);
      border-top-color: #8e6d50;
      border-radius: 50%;

      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .progress-box {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);

      width: min(90%, 500px);
      padding: 13px 15px;

      display: none;

      background: rgba(255, 252, 247, 0.98);
      border: 1px solid rgba(122, 96, 72, 0.25);
      border-radius: 13px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.17);

      z-index: 999;
    }

    .progress-box.show {
      display: block;
    }

    .progress-text {
      margin-bottom: 9px;
      color: #4b4038;
      font-size: 14px;
      text-align: center;
    }

    .progress-track {
      width: 100%;
      height: 7px;
      overflow: hidden;

      background: #e4dbd2;
      border-radius: 20px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;

      background: #b58a45;
      border-radius: 20px;
      transition: width 0.25s ease;
    }

    @media (max-width: 600px) {
      .status-box {
        bottom: 14px;
        padding: 13px 14px;
        font-size: 13px;
      }

      .progress-box {
        bottom: 82px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <!-- Klickområde för bilder och videor -->
    <label
      id="uploadArea"
      class="upload-area"
      for="fileInput"
      aria-label="Ladda upp bilder och videor"
    ></label>

    <input
      id="fileInput"
      type="file"
      multiple
      accept="image/*,video/*"
    >

    <!-- Fungerande QR-kod ovanpå originaldesignen -->
    <div class="qr-cover">
      <div id="qrCode"></div>
    </div>

  </main>

  <div id="progressBox" class="progress-box">
    <div id="progressText" class="progress-text">
      Förbereder uppladdning…
    </div>

    <div class="progress-track">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div id="statusBox" class="status-box"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR-kod -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>
    /*
      =========================================================
      SUPABASE
      =========================================================
    */

    const SUPABASE_URL =
      "https://xcljfsvyufnsouzjfhcb.supabase.co";

    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjbGpmc3Z5dWZuc291empmaGNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDA4MjAsImV4cCI6MjA5ODg3NjgyMH0.SwCTMKlb2hEqsYVrwCTtByz8jMN6k6vgCWITVEvHx7U";

    const BUCKET_NAME = "wedding-uploads";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );


    /*
      =========================================================
      HTML-ELEMENT
      =========================================================
    */

    const fileInput =
      document.getElementById("fileInput");

    const uploadArea =
      document.getElementById("uploadArea");

    const statusBox =
      document.getElementById("statusBox");

    const progressBox =
      document.getElementById("progressBox");

    const progressText =
      document.getElementById("progressText");

    const progressBar =
      document.getElementById("progressBar");


    /*
      =========================================================
      QR-KOD

      QR-koden använder automatiskt den riktiga adressen
      till sidan som är öppen.
      =========================================================
    */

    function createQrCode() {
      const qrContainer =
        document.getElementById("qrCode");

      qrContainer.innerHTML = "";

      const pageUrl =
        window.location.origin +
        window.location.pathname;

      new QRCode(qrContainer, {
        text: pageUrl,
        width: 600,
        height: 600,
        colorDark: "#101010",
        colorLight: "#faf6ef",
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    window.addEventListener("load", createQrCode);


    /*
      =========================================================
      STATUS
      =========================================================
    */

    let statusTimer;

    function showStatus(message, type) {
      clearTimeout(statusTimer);

      statusBox.className =
        "status-box show " + type;

      if (type === "loading") {
        statusBox.innerHTML =
          '<span class="spinner"></span>' +
          '<span>' + message + "</span>";
      } else {
        statusBox.textContent = message;
      }
    }

    function hideStatusAfter(milliseconds) {
      clearTimeout(statusTimer);

      statusTimer = setTimeout(function () {
        statusBox.className = "status-box";
        statusBox.innerHTML = "";
      }, milliseconds);
    }

    function showProgress(current, total, fileName) {
      progressBox.classList.add("show");

      progressText.textContent =
        "Laddar upp " +
        current +
        " av " +
        total +
        ": " +
        fileName;

      const percent =
        Math.round(((current - 1) / total) * 100);

      progressBar.style.width =
        percent + "%";
    }

    function finishProgress() {
      progressBar.style.width = "100%";

      setTimeout(function () {
        progressBox.classList.remove("show");
        progressBar.style.width = "0%";
      }, 900);
    }

    function hideProgress() {
      progressBox.classList.remove("show");
      progressBar.style.width = "0%";
    }


    /*
      =========================================================
      FILKONTROLL
      =========================================================
    */

    function validateFile(file) {
      const maxSize =
        100 * 1024 * 1024;

      const isImage =
        file.type.startsWith("image/");

      const isVideo =
        file.type.startsWith("video/");

      if (!isImage && !isVideo) {
        throw new Error(
          file.name +
          " är inte en bild eller video."
        );
      }

      if (file.size > maxSize) {
        throw new Error(
          file.name +
          " är större än 100 MB."
        );
      }
    }


    /*
      =========================================================
      SKAPA UNIK FILVÄG
      =========================================================
    */

    function getExtension(file) {
      const fileName = file.name || "";
      const lastDot = fileName.lastIndexOf(".");

      if (lastDot !== -1) {
        return fileName
          .substring(lastDot)
          .toLowerCase();
      }

      if (file.type === "image/jpeg") return ".jpg";
      if (file.type === "image/png") return ".png";
      if (file.type === "image/webp") return ".webp";
      if (file.type === "image/gif") return ".gif";
      if (file.type.includes("heic")) return ".heic";
      if (file.type === "video/mp4") return ".mp4";
      if (file.type === "video/quicktime") return ".mov";

      return "";
    }

    function createFilePath(file) {
      const now = new Date();

      const dateFolder =
        now.getFullYear() +
        "-" +
        String(now.getMonth() + 1).padStart(2, "0") +
        "-" +
        String(now.getDate()).padStart(2, "0");

      const uniqueName =
        typeof crypto !== "undefined" &&
        crypto.randomUUID
          ? crypto.randomUUID()
          : Date.now() +
            "-" +
            Math.random()
              .toString(36)
              .substring(2, 12);

      return (
        "guests/" +
        dateFolder +
        "/" +
        uniqueName +
        getExtension(file)
      );
    }


    /*
      =========================================================
      LADDA UPP EN FIL
      =========================================================
    */

    async function uploadOneFile(file) {
      validateFile(file);

      const filePath =
        createFilePath(file);

      const result =
        await supabaseClient.storage
          .from(BUCKET_NAME)
          .upload(filePath, file, {
            cacheControl: "3600",
            upsert: false,
            contentType:
              file.type ||
              "application/octet-stream"
          });

      if (result.error) {
        throw new Error(
          result.error.message
        );
      }

      if (
        !result.data ||
        !result.data.path
      ) {
        throw new Error(
          "Supabase bekräftade inte uppladdningen."
        );
      }

      return result.data;
    }


    /*
      =========================================================
      LADDA UPP ALLA VALDA FILER
      =========================================================
    */

    async function handleFiles(fileList) {
      const files =
        Array.from(fileList || []);

      if (files.length === 0) {
        return;
      }

      let successfulUploads = 0;
      const errors = [];

      showStatus(
        "Uppladdningen startar. Stäng inte sidan.",
        "loading"
      );

      try {
        for (
          let index = 0;
          index < files.length;
          index++
        ) {
          const file = files[index];

          showProgress(
            index + 1,
            files.length,
            file.name
          );

          try {
            await uploadOneFile(file);
            successfulUploads++;

          } catch (error) {
            console.error(
              "Fel vid uppladdning:",
              error
            );

            errors.push(
              file.name +
              ": " +
              error.message
            );
          }
        }

        fileInput.value = "";

        if (
          successfulUploads === files.length
        ) {
          finishProgress();

          showStatus(
            successfulUploads === 1
              ? "Tack! Din fil har laddats upp och sparats."
              : "Tack! Alla " +
                successfulUploads +
                " filer har laddats upp och sparats.",
            "success"
          );

          hideStatusAfter(6000);
          return;
        }

        hideProgress();

        if (successfulUploads > 0) {
          showStatus(
            successfulUploads +
            " av " +
            files.length +
            " filer laddades upp. " +
            errors.join(" "),
            "error"
          );

          return;
        }

        showStatus(
          "Ingen fil kunde laddas upp. " +
          errors.join(" "),
          "error"
        );

      } catch (error) {
        hideProgress();

        showStatus(
          "Uppladdningen misslyckades: " +
          error.message,
          "error"
        );
      }
    }


    /*
      =========================================================
      FILVAL
      =========================================================
    */

    fileInput.addEventListener(
      "change",
      function () {
        handleFiles(fileInput.files);
      }
    );


    /*
      =========================================================
      DRA OCH SLÄPP PÅ DATOR
      =========================================================
    */

    [
      "dragenter",
      "dragover"
    ].forEach(function (eventName) {
      uploadArea.addEventListener(
        eventName,
        function (event) {
          event.preventDefault();
          event.stopPropagation();

          uploadArea.classList.add(
            "dragging"
          );
        }
      );
    });

    [
      "dragleave",
      "drop"
    ].forEach(function (eventName) {
      uploadArea.addEventListener(
        eventName,
        function (event) {
          event.preventDefault();
          event.stopPropagation();

          uploadArea.classList.remove(
            "dragging"
          );
        }
      );
    });

    uploadArea.addEventListener(
      "drop",
      function (event) {
        const droppedFiles =
          event.dataTransfer.files;

        handleFiles(droppedFiles);
      }
    );
  </script>

</body>
</html>
