<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monica & Bjarne</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#eee4d8}
body{display:flex;justify-content:center}

.page{
  position:relative;
  width:100vw;
  max-width:1024px;
  aspect-ratio:1024/1536;
  min-height:153vw;
  background:url("background.jpeg") center top / 100% auto no-repeat;
}

.upload-click{
  position:absolute;
  left:27.8%;
  top:52.6%;
  width:11.2%;
  height:2.8%;
  cursor:pointer;
  z-index:50;
}

.upload-click input{display:none}

.status-box{
  position:absolute;
  left:8%;
  top:60.5%;
  width:50%;
  padding:12px;
  background:white;
  border-radius:14px;
  font-family:Arial,sans-serif;
  font-size:13px;
  color:#222;
  z-index:60;
  display:none;
  box-shadow:0 5px 18px rgba(0,0,0,.15);
}

.status-box.show{display:block}

@media(min-width:701px){
  .page{min-height:auto}
}
</style>
</head>

<body>

<div class="page">
  <label class="upload-click">
    <input id="fileInput" type="file" multiple accept="image/*,video/*">
  </label>

  <div id="statusBox" class="status-box"></div>
</div>

<script>
const SUPABASE_URL = "https://xcjlfsyvufnsouzjfhcb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjbGpmc3Z5dWZuc291empmaGNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDA4MjAsImV4cCI6MjA5ODg3NjgyMH0.SwCTMKlb2hEqsYVrwCTtByz8jMN6k6vgCWITVEvHx7U";
const BUCKET = "wedding-uploads";

const fileInput = document.getElementById("fileInput");
const statusBox = document.getElementById("statusBox");

function show(text){
  statusBox.classList.add("show");
  statusBox.innerHTML = text;
}

function cleanName(name){
  return name
    .replace(/\s+/g,"-")
    .replace(/[åä]/g,"a")
    .replace(/[ö]/g,"o")
    .replace(/[ÅÄ]/g,"A")
    .replace(/[Ö]/g,"O")
    .replace(/[^a-zA-Z0-9._-]/g,"");
}

fileInput.addEventListener("change", async () => {
  const files = Array.from(fileInput.files);
  if(!files.length) return;

  show("⏳ Laddar upp...");

  let uploaded = 0;

  for(const file of files){
    const fileName = cleanName(file.name);
    const path = `brollop/${Date.now()}-${Math.random().toString(36).slice(2)}-${fileName}`;

    const url = `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`;

    try{
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": file.type || "application/octet-stream",
          "x-upsert": "false"
        },
        body: file
      });

      const text = await response.text();

      if(!response.ok){
        show("❌ Fel: " + text);
        return;
      }

      uploaded++;
      show(`⏳ Laddar upp ${uploaded} av ${files.length}...`);

    }catch(error){
      show("❌ Fel: " + error.message);
      return;
    }
  }

  show("✅ Tack! Dina filer har laddats upp.");
  fileInput.value = "";
});
</script>

</body>
</html>
