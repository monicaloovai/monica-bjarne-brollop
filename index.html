<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Monica & Bjarne</title>

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#eee4d8;
}

body{
  display:flex;
  justify-content:center;
}

.page{
  position:relative;
  width:100vw;
  max-width:1024px;
  aspect-ratio:1024 / 1536;

  background:
    url("./background.jpeg")
    center top / 100% auto
    no-repeat;
}

/*
  QR-rutan centreras med sin mittpunkt.
  transform gör att vänster och höger sida blir jämna.
*/
.qr-cover{
  position:absolute;

  left:77.1%;
  top:42.4%;

  transform:translateX(-50%);

  width:23.4%;
  height:16.8%;

  display:flex;
  justify-content:center;
  align-items:center;

  background:#fffaf2;
  border-radius:8%;

  box-shadow:
    0 5px 16px rgba(0,0,0,.08);

  overflow:hidden;
  z-index:40;
}

/* Själva QR-koden */
#qrcode{
  width:66%;
  aspect-ratio:1 / 1;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;
}

/* Visa QR-kodens canvas */
#qrcode canvas{
  display:block !important;

  width:100% !important;
  height:100% !important;

  margin:0 !important;
  padding:0 !important;
}

/* Dölj eventuell extra bildversion */
#qrcode img{
  display:none !important;
}

/* Klickbart område ovanpå knappen VÄLJ FILER */
.upload-click{
  position:absolute;

  left:27.8%;
  top:52.6%;

  width:11.2%;
  height:2.8%;

  cursor:pointer;
  z-index:50;
}

.upload-click input{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  opacity:0;
  cursor:pointer;
}

/* Meddelande under uppladdningen */
.status-box{
  position:absolute;

  left:8%;
  top:60.5%;

  width:50%;
  padding:12px;

  background:#ffffff;
  border-radius:14px;

  box-shadow:
    0 5px 18px rgba(0,0,0,.15);

  font-family:Arial,Helvetica,sans-serif;
  font-size:13px;
  line-height:1.4;
  color:#222;

  display:none;
  z-index:60;
}

.status-box.show{
  display:block;
}

.status-box.loading{
  color:#3f3f3f;
  background:#ffffff;
}

.status-box.success{
  color:#176b3a;
  background:#f0fff5;
}

.status-box.error{
  color:#9b1c1c;
  background:#fff2f2;
}

@media(max-width:700px){
  .status-box{
    padding:8px;
    font-size:11px;
    border-radius:10px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- Automatiskt skapad QR-kod -->
  <div class="qr-cover">
    <div
      id="qrcode"
      aria-label="QR-kod till Monica och Bjarnes bröllopssida"
    ></div>
  </div>

  <!-- Klickområde ovanpå VÄLJ FILER -->
  <label
    class="upload-click"
    aria-label="Välj bilder eller videor"
  >
    <input
      id="fileInput"
      type="file"
      multiple
      accept="image/jpeg,image/png,image/webp,image/gif,video/mp4"
    >
  </label>

  <!-- Statusmeddelande -->
  <div
    id="statusBox"
    class="status-box"
    aria-live="polite"
  ></div>

</div>

<!-- Bibliotek för att skapa QR-koden -->
<script
  src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
></script>

<script>
const QR_TARGET_URL =
  "https://monica-bjarne-brollop.vercel.app/";

const SUPABASE_URL =
  "https://gdbvwzwkguankzabjlup.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_JyHn5_XGnNmqnQSQM4h2Zw_WwGbKeBE";

const BUCKET =
  "wedding-uploads";

const MAX_FILE_SIZE =
  100 * 1024 * 1024;

const ALLOWED_TYPES = [
  "image/jpeg",
  "image/png",
  "image/webp",
  "image/gif",
  "video/mp4"
];

const fileInput =
  document.getElementById("fileInput");

const statusBox =
  document.getElementById("statusBox");

/* Skapa QR-koden */
function createQRCode(){
  const qrContainer =
    document.getElementById("qrcode");

  qrContainer.innerHTML = "";

  new QRCode(qrContainer,{
    text:QR_TARGET_URL,
    width:400,
    height:400,
    colorDark:"#303030",
    colorLight:"#fffaf2",
    correctLevel:QRCode.CorrectLevel.H
  });
}

if(typeof QRCode !== "undefined"){
  createQRCode();
}else{
  document.getElementById("qrcode").textContent =
    "QR-koden kunde inte laddas.";
}

/* Visa statusmeddelande */
function showStatus(message,type="loading"){
  statusBox.className =
    "status-box show";

  if(type){
    statusBox.classList.add(type);
  }

  statusBox.textContent =
    message;
}

/* Rensa filnamnet */
function cleanFileName(fileName){
  return fileName
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-zA-Z0-9._-]/g,"")
    .toLowerCase();
}

/* Skapa unik sökväg för filen */
function createFilePath(fileName){
  const cleanedName =
    cleanFileName(fileName);

  const uniqueId =
    Date.now() +
    "-" +
    Math.random()
      .toString(36)
      .slice(2,10);

  return `brollop/${uniqueId}-${cleanedName}`;
}

/* Ladda upp en fil till Supabase */
async function uploadFile(file){
  const path =
    createFilePath(file.name);

  const uploadUrl =
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`;

  const response =
    await fetch(uploadUrl,{
      method:"POST",

      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`,
        "Content-Type":
          file.type ||
          "application/octet-stream",
        "x-upsert":"false"
      },

      body:file
    });

  const responseText =
    await response.text();

  let responseData = null;

  try{
    responseData =
      JSON.parse(responseText);
  }catch{
    responseData = null;
  }

  if(!response.ok){
    const errorMessage =
      responseData?.message ||
      responseData?.error ||
      responseText ||
      `Uppladdningen misslyckades. Felkod ${response.status}.`;

    throw new Error(errorMessage);
  }

  return path;
}

/* När gästen väljer filer */
fileInput.addEventListener("change",async()=>{
  const files =
    Array.from(fileInput.files || []);

  if(files.length === 0){
    return;
  }

  for(const file of files){
    if(!ALLOWED_TYPES.includes(file.type)){
      showStatus(
        `❌ Filtypen stöds inte: ${file.name}`,
        "error"
      );

      fileInput.value = "";
      return;
    }

    if(file.size > MAX_FILE_SIZE){
      showStatus(
        `❌ ${file.name} är större än 100 MB.`,
        "error"
      );

      fileInput.value = "";
      return;
    }
  }

  let uploaded = 0;

  try{
    showStatus(
      `⏳ Förbereder uppladdning av ${files.length} fil(er)...`,
      "loading"
    );

    for(const file of files){
      showStatus(
        `⏳ Laddar upp ${uploaded + 1} av ${files.length}: ${file.name}`,
        "loading"
      );

      await uploadFile(file);
      uploaded++;
    }

    showStatus(
      `✅ Tack! ${uploaded} fil(er) har laddats upp.`,
      "success"
    );

  }catch(error){
    console.error(
      "Supabase upload error:",
      error
    );

    showStatus(
      `❌ Fel: ${error.message}`,
      "error"
    );

  }finally{
    fileInput.value = "";
  }
});
</script>

</body>
</html>
